# KrillReport YAML configuration example.
# Copy to `config.yaml` (or point KRILLREPORT_CONFIG at it) to use.
#
# Precedence: explicit CLI flags > environment variables > .env > this file > defaults.
# Anything omitted here falls back to the built-in default.

data_dir: krilldata
# templates_dir: krilldata/templates
# output_dir: krilldata/output
# upload_dir: krilldata/uploads

host: 127.0.0.1
port: 8000

log_level: INFO
# log_file: krilldata/krillreport.log

llm:
  # provider: offline | anthropic | openai | ollama
  provider: offline
  # Leave blank to use the provider default model.
  model: ""
  # api_key: null            # falls back to ANTHROPIC_API_KEY / OPENAI_API_KEY
  # base_url: null            # e.g. http://localhost:11434 for ollama
  max_tokens: 2048
  # temperature: 0.4          # omit for Anthropic Opus models (rejected)
  timeout: 90
  enabled: true
