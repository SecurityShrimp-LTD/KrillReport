<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KrillReport{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <span class="logo">🦐 KrillReport</span>
      <span class="tagline">Pentest &amp; red-team report generation</span>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="wrap foot">
    <span>v{{ version }}</span>
    <span>Supported inputs: {{ supported_extensions | join(', ') }}</span>
    <span>LLM: {{ current_provider }}{{ '' if llm_enabled else ' (disabled)' }}</span>
  </footer>
  <script src="/static/upload.js" defer></script>
</body>
</html>
